<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Accessible contact page</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.5;
        margin: 0;
      }

      .skip-link {
        position: absolute;
        top: 8px;
        left: 8px;
        z-index: 1000;
        padding: 8px 12px;
        min-height: 24px;
        background: #ffffff;
        color: #000000;
        border: 2px solid #000000;
        transform: translateY(-150%);
      }

      .skip-link:focus {
        transform: translateY(0);
      }

      header {
        padding: 16px;
        border-bottom: 1px solid #cccccc;
      }

      nav a {
        display: inline-block;
        min-height: 24px;
        padding: 8px 12px;
      }

      main {
        padding: 24px 16px;
      }

      form {
        max-width: 400px;
      }

      form div {
        margin-bottom: 16px;
      }

      label {
        display: block;
        margin-bottom: 4px;
      }

      input,
      textarea,
      button {
        font: inherit;
      }

      input,
      textarea {
        width: 100%;
        padding: 8px;
      }

      textarea {
        min-height: 120px;
      }

      button {
        min-height: 44px;
        padding: 8px 16px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <header>
      <nav aria-label="Main navigation">
        <a href="/pages/real-world-example.html">Contact</a>
      </nav>
    </header>

    <main id="main-content" tabindex="-1">
      <h1>Contact us</h1>
      <p>Use this form to send us a message.</p>

      <form>
        <div>
          <label for="name">Name</label>
          <input id="name" name="name" type="text" autocomplete="name">
        </div>

        <div>
          <label for="message">Message</label>
          <textarea id="message" name="message"></textarea>
        </div>

        <button type="submit">Send message</button>
      </form>
    </main>
  </body>
</html>
